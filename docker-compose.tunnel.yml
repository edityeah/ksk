# Production stack behind Cloudflare Tunnel.
#
# Coexists with the dev stack (docker-compose.yml) AND with gpcsk on the
# same host:
#   dev  : ksk-db        on host port 5434
#   prod : ksk-prod-db   on host port 5436 (gpcsk-prod-db owns 5435)
#         ksk-prod-app  on host port 8788
#
# All host port bindings are 127.0.0.1 only — only cloudflared (running
# on the host) can reach them. Cloudflare Tunnel terminates TLS at
# ksk.adityeah.ai and tunnels HTTP to 127.0.0.1:8788.
#
# Bring up:
#   docker compose --project-name ksk-prod \
#                  --env-file .env.production \
#                  -f docker-compose.tunnel.yml \
#                  up -d --build
#
# Tear down (keeps data):
#   docker compose --project-name ksk-prod \
#                  -f docker-compose.tunnel.yml \
#                  down
#
# Tear down + WIPE DATA:
#   docker compose --project-name ksk-prod \
#                  -f docker-compose.tunnel.yml \
#                  down -v

services:
  db:
    image: postgres:17-alpine
    container_name: ksk-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ksk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ksk
    volumes:
      - ksk-prod-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksk -d ksk"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ksk-prod]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ksk-prod-app
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    ports:
      - "127.0.0.1:8788:8787"
    environment:
      NODE_ENV: production
      PORT: "8787"
      DATABASE_URL: postgresql://ksk:${POSTGRES_PASSWORD}@db:5432/ksk
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.production}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      # ── OpenAI (required for voice + RAG) ──────────────────────────
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime}
      OPENAI_REALTIME_VOICE: ${OPENAI_REALTIME_VOICE:-verse}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-50}
      # ── Anam avatar (optional — falls back to text-only if absent) ─
      ANAM_API_KEY: ${ANAM_API_KEY:-}
      ANAM_AVATAR_ID: ${ANAM_AVATAR_ID:-}
      ANAM_VOICE_ID: ${ANAM_VOICE_ID:-}
      # ── Zep memory (optional) ──────────────────────────────────────
      ZEP_API_KEY: ${ZEP_API_KEY:-}
      # ── Cartesia TTS (optional) ────────────────────────────────────
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      CARTESIA_VOICE_ID: ${CARTESIA_VOICE_ID:-}
      CARTESIA_MODEL_ID: ${CARTESIA_MODEL_ID:-sonic-2}
    networks: [ksk-prod]

volumes:
  ksk-prod-pgdata:

networks:
  ksk-prod:
    driver: bridge
